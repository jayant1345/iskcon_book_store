services:
  - type: web
    name: iskcon-book-store
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --config gunicorn.conf.py
    plan: free
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: iskcon-db
          property: connectionString
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: WHATSAPP_NUMBER
        sync: false
      - key: SHIPPING_CHARGES
        value: "50"
      - key: FREE_SHIPPING_THRESHOLD
        value: "500"

databases:
  - name: iskcon-db
    plan: free
    databaseName: iskcon_books
