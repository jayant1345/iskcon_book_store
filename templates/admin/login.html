<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - {{ store_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #FF9933 0%, #FFFFFF 50%, #FF9933 100%); min-height:100vh; }
        .login-card { background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        .login-header { background: #FF9933; color: white; border-radius: 16px 16px 0 0; padding: 2rem; text-align: center; }
        .login-header h2 { font-weight: 700; margin: 0; }
        .login-header p { margin: 5px 0 0; opacity: 0.9; }
        .form-control:focus { border-color: #FF9933; box-shadow: 0 0 0 0.25rem rgba(255,153,51,0.25); }
        .btn-login { background: #FF9933; color: white; border: none; padding: 12px; font-weight: 600; border-radius: 8px; }
        .btn-login:hover { background: #e67300; color: white; }
        .om-symbol { font-size: 3rem; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-5 col-lg-4">
            <div class="login-card overflow-hidden">
                <div class="login-header py-4">
                    <div class="om-symbol">🕉</div>
                    <h2><i class="fas fa-user-shield me-2"></i>Admin Panel</h2>
                    <p class="mb-0">{{ store_name }}</p>
                </div>
                <div class="p-4">
                    {% with messages = get_flashed_messages(with_categories=true) %}
                      {% for cat, msg in messages %}
                        <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
                      {% endfor %}
                    {% endwith %}
                    <form method="POST" action="{{ url_for('admin_login') }}">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-login w-100">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="{{ url_for('index') }}" class="text-decoration-none small">
                            <i class="fas fa-arrow-left me-1"></i>Back to Store
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
