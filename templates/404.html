<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | {{ store_name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #FF9933 0%, #FFFFFF 50%, #FF9933 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .error-card { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); padding: 3rem; text-align: center; max-width: 500px; }
    .error-icon { font-size: 5rem; margin-bottom: 1rem; }
    h1 { font-size: 5rem; font-weight: 700; color: #FF9933; }
    h2 { font-weight: 600; color: #333; }
    .btn-iskcon { background: #FF9933; color: white; border: none; padding: 12px 30px; border-radius: 8px; text-decoration: none; font-weight: 600; }
    .btn-iskcon:hover { background: #e67300; color: white; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-icon">🪷</div>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p class="text-muted my-3">The page you are looking for seems to have wandered off somewhere in the material world.</p>
    <p style="font-style: italic; color: #FF9933;">"The soul can never be created nor destroyed." — Bhagavad Gita 2.20</p>
    <a href="{{ url_for('index') }}" class="btn btn-iskcon mt-3">
      <i class="fas fa-home me-2"></i>Return Home
    </a>
  </div>
</body>
</html>
